<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Hand Writer</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="app-container">
        <canvas id="paint_canvas"></canvas>
        
        <div class="ui-overlay">
            <h1>নিয়ন হ্যান্ড রাইটার</h1>
            <p id="status">ক্যামেরা লোড হচ্ছে...</p>
            <div class="controls">
                <input type="color" id="colorPicker" value="#00ffff">
                <button id="clearBtn">মুছে ফেলুন (Clear)</button>
            </div>
            <p class="instruction">ইন্সট্রাকশন: তর্জনী ও বুড়ো আঙুল একসাথে জোড়া লাগিয়ে (Pinch করে) স্ক্রিনে লিখুন।</p>
        </div>
        
        <video id="input_video" style="display:none;"></video>
        <canvas id="webcam_canvas" class="webcam-preview"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
